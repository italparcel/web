[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Security headers intentionally do NOT live here: netlify.toml [[headers]]
# only reach static CDN assets, never HTML/API responses served by the Next.js
# runtime (verified in production 2026-07-02). They are set in next.config.ts
# `headers()` instead. Only static-asset cache-control rules belong below.

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logo.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"
